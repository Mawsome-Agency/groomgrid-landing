<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="50%" stop-color="#fdfdf8"/>
      <stop offset="100%" stop-color="#fff5f0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#ff7755"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="200" fill="#14b8a6" opacity="0.06"/>
  <circle cx="100" cy="550" r="180" fill="#ff7755" opacity="0.05"/>
  <circle cx="600" cy="315" r="400" fill="#d9ce88" opacity="0.04"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="64" height="64" rx="16" fill="url(#logoGrad)"/>
  <circle cx="97" cy="102" r="7" fill="white" opacity="0.9"/>
  <circle cx="127" cy="102" r="7" fill="white" opacity="0.9"/>
  <circle cx="84" cy="117" r="5.5" fill="white" opacity="0.9"/>
  <circle cx="140" cy="117" r="5.5" fill="white" opacity="0.9"/>
  <ellipse cx="112" cy="130" rx="16" ry="13" fill="white" opacity="0.9"/>

  <!-- Brand name -->
  <text x="164" y="122" font-family="system-ui, sans-serif" font-weight="800" font-size="40" fill="#111827">Groom</text>
  <text x="290" y="122" font-family="system-ui, sans-serif" font-weight="800" font-size="40" fill="#0d9488">Grid</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="system-ui, sans-serif" font-weight="800" font-size="68" fill="#111827">The Grooming Business</text>
  <text x="80" y="360" font-family="system-ui, sans-serif" font-weight="800" font-size="68" fill="url(#textGrad)">That Runs Itself</text>

  <!-- Subheadline -->
  <text x="80" y="430" font-family="system-ui, sans-serif" font-size="28" fill="#6b7280">AI scheduling · Breed detection · Smart rebooking · Payments</text>

  <!-- Feature badges -->
  <rect x="80" y="480" width="200" height="44" rx="22" fill="#ccfbf1" stroke="#99f6e4" stroke-width="1"/>
  <text x="180" y="508" font-family="system-ui, sans-serif" font-weight="600" font-size="18" fill="#0d9488" text-anchor="middle">🧠 AI Breed ID</text>

  <rect x="294" y="480" width="190" height="44" rx="22" fill="#ccfbf1" stroke="#99f6e4" stroke-width="1"/>
  <text x="389" y="508" font-family="system-ui, sans-serif" font-weight="600" font-size="18" fill="#0d9488" text-anchor="middle">📅 Smart Booking</text>

  <rect x="498" y="480" width="200" height="44" rx="22" fill="#fff5f0" stroke="#ffc9b0" stroke-width="1"/>
  <text x="598" y="508" font-family="system-ui, sans-serif" font-weight="600" font-size="18" fill="#e63d1a" text-anchor="middle">🔄 Auto-Rebook</text>

  <!-- Right side URL -->
  <text x="1120" y="590" font-family="system-ui, sans-serif" font-size="24" fill="#9ca3af" text-anchor="end">groomgrid.com</text>
</svg>
